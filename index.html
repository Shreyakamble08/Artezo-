<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <title>Artezo Store - Home</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="./Header/header.css" />

  <!-- Optional: your Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&family=Zain:wght@200;300;400;700;800;900&display=swap" rel="stylesheet" />

  <!-- Tailwind config -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#1D3C4A",
            accent: "#E39F32",
          },
          fontFamily: {
            lexend: ["Lexend", "sans-serif"],
            zain: ["Zain", "sans-serif"],
          },
        },
      },
    };
  </script>
</head>

<body class="bg-zinc-50 font-lexend antialiased">
  <main class="min-h-screen pt-6">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <h1 class="text-4xl font-bold text-primary mt-12 mb-6">
        Welcome to Artezo Store
      </h1>

      <p class="text-lg text-gray-700 mb-8">
        This is your home page. The header (top bar, search, navigation, mobile menu, etc.) 
        is loaded automatically from the <code>header/</code> folder.
      </p>

      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <!-- Sample product cards -->
        <div class="bg-white rounded-xl shadow-sm overflow-hidden">
          <div class="h-48 bg-gray-100 flex items-center justify-center">
            <span class="text-gray-400">Product Image</span>
          </div>
          <div class="p-5">
            <h3 class="font-medium text-lg">Handcrafted Wall Art</h3>
            <p class="text-accent font-semibold mt-1">₹1,499</p>
          </div>
        </div>
      </div>
    </div>
  </main>

<!-- Load header scripts -->
  <script src="./Header/load-header.js" defer></script>
  <script src="./Header/header.js" defer></script>

</body>
</html>
