    <style>
        /* modern card styles with warm tones */

            padding: 1.5rem;

        }

            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;

        /* Delete Confirmation Popup */
        .delete-popup-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 2000;

        .delete-popup {

            border-radius: 1.5rem;
            max-width: 400px;
            width: 90%;

            }

            background: #FEE2E2;

    <!-- Profile Page JavaScript (FULLY DYNAMIC) -->
    <script>
        // ========== TOASTIFY HELPER FUNCTION ==========
        function showToast(message, type = 'success', duration = 3000) {
            let className;
            
            switch(type) {
                case 'success':
                    className = 'toastify-success';
                    break;
                case 'error':
                    className = 'toastify-error';
                    break;
                case 'warning':
                    className = 'toastify-warning';
                    break;
                case 'info':
                    className = 'toastify-info';
                    break;
                default:
                    className = 'toastify-success';
            }
            
            Toastify({
                text: message,
                duration: duration,
                close: true,
                gravity: "top",
                position: "right",
                stopOnFocus: true,
                className: `toastify-custom ${className}`,
                onClick: function() {},
                style: {
                    background: "transparent",
                    boxShadow: "none"
                }
            }).showToast();
        }

        // ========== INITIALIZE DEFAULT DATA ==========
        function initializeDefaultData() {
            // Check if data exists in localStorage
            if (!localStorage.getItem('profileData')) {
                const defaultProfile = {
                    name: "Shreya Sharma",
                    email: "shreya.pune@gmail.com",
                    phone: "9876543210",
                    city: "Pune",
                    avatar: "https://picsum.photos/id/64/100"
                };
                localStorage.setItem('profileData', JSON.stringify(defaultProfile));
            }

            if (!localStorage.getItem('addresses')) {
                const defaultAddresses = [
                    {
                        id: 1,
                        type: "home",
                        street: "42, Shivaji Nagar, Lane No. 3",
                        city: "Pune",
                        state: "Maharashtra",
                        pincode: "411005",
                        country: "India",
                        isDefault: true
                    },
                    {
                        id: 2,
                        type: "work",
                        street: "15th Floor, Cyber City Tower A, Magarpatta",
                        city: "Pune",
                        state: "Maharashtra",
                        pincode: "411028",
                        country: "India",
                        isDefault: false
                    }
                ];
                localStorage.setItem('addresses', JSON.stringify(defaultAddresses));
            }
        }

        // ========== LOAD DATA FROM LOCALSTORAGE ==========
        function loadProfileData() {
            const savedProfile = localStorage.getItem('profileData');
            return savedProfile ? JSON.parse(savedProfile) : null;
        }

        function loadAddresses() {
            const savedAddresses = localStorage.getItem('addresses');
            return savedAddresses ? JSON.parse(savedAddresses) : [];
        }

        // ========== SAVE DATA TO LOCALSTORAGE ==========
        function saveProfileData(profile) {
            localStorage.setItem('profileData', JSON.stringify(profile));
        }

        function saveAddresses(addressList) {
            localStorage.setItem('addresses', JSON.stringify(addressList));
        }

        // ========== GLOBAL STATE ==========
        let profileData = loadProfileData();
        let addresses = loadAddresses();
        let currentAddressId = null; // For editing
        let addressToDelete = null; // For delete popup

        // Initialize with defaults if no data exists
        if (!profileData) {
            initializeDefaultData();
            profileData = loadProfileData();
            addresses = loadAddresses();
        }

        // ========== RENDER FUNCTIONS ==========
        function renderSidebar() {
            const sidebar = document.getElementById("profile-sidebar");
            sidebar.innerHTML = `
                <div class="text-center mb-6">
                    <img src="${profileData.avatar}" class="w-24 h-24 rounded-full mx-auto mb-3 border-4 border-accent/30 shadow-md">
                    <h3 class="font-semibold text-lg text-primary">${profileData.name}</h3>
                    <p class="text-sm text-amber-700">${profileData.email}</p>
                </div>
                <div class="space-y-2 text-sm">
                    <a href="#" class="block px-4 py-3 rounded-lg bg-accent/20 text-primary font-medium border-l-4 border-accent"><i class="fa fa-user mr-2"></i>Profile</a>
                    <a href="/Myorders/orders.html" class="block px-4 py-3 rounded-lg hover:bg-amber-50 text-gray-700"><i class="fa fa-box mr-2"></i>Orders</a>
                    <a href="../Wishlist/wishlist.html" class="block px-4 py-3 rounded-lg hover:bg-amber-50 text-gray-700"><i class="fa fa-heart mr-2"></i>Wishlist</a>
                </div>
            `;
        }

        function updateDisplayView() {
            document.getElementById('displayName').textContent = profileData.name;
            document.getElementById('displayEmail').textContent = profileData.email;
            document.getElementById('displayPhone').textContent = profileData.phone;
            document.getElementById('displayCity').textContent = profileData.city;
        }

        function renderAddresses() {
            const container = document.getElementById("addresses-container");
            if (addresses.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12 bg-[#FFF7E8] rounded-3xl border border-dashed border-amber-300">
                        <i class="fa-solid fa-map-pin text-4xl text-amber-300 mb-3"></i>
                        <p class="text-gray-600">No addresses saved yet</p>
                        <p class="text-sm text-amber-600 mt-1">Click "Add new" to add one</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = addresses.map(addr => {
                const typeIcon = addr.type === 'home' ? 'fa-house' : addr.type === 'work' ? 'fa-briefcase' : 'fa-location-dot';
                const typeLabel = addr.type.charAt(0).toUpperCase() + addr.type.slice(1);
                return `
                <div class="address-compact-card ${addr.isDefault ? 'default' : ''}" data-id="${addr.id}">
                    <div class="flex flex-wrap items-center justify-between gap-2">
                        <div class="flex items-center gap-3">
                            <span class="badge-type"><i class="fa-solid ${typeIcon}"></i> ${typeLabel}</span>
                            ${addr.isDefault ? '<span class="badge-default">Default</span>' : ''}
                        </div>
                        <div class="flex gap-2">
                            <button onclick="editAddress(${addr.id})" class="text-gray-400 hover:text-accent transition bg-white w-8 h-8 rounded-full flex items-center justify-center border border-amber-200 shadow-sm"><i class="fa-solid fa-pen fa-xs"></i></button>
                            <button onclick="deleteAddress(${addr.id})" class="text-gray-400 hover:text-red-500 transition bg-white w-8 h-8 rounded-full flex items-center justify-center border border-amber-200 shadow-sm"><i class="fa-solid fa-trash fa-xs"></i></button>
                        </div>
                    </div>
                    <p class="font-semibold mt-2 text-gray-800">${addr.street}</p>
                    <p class="text-sm text-gray-600">${addr.city}, ${addr.state} - ${addr.pincode}</p>
                    <p class="text-sm text-gray-500">${addr.country}</p>
                    ${!addr.isDefault ? `
                        <button onclick="setDefaultAddress(${addr.id})" class="mt-2 text-xs text-accent hover:underline flex items-center gap-1"><i class="fa-regular fa-star"></i> Set as default</button>
                    ` : ''}
                </div>
            `}).join('');
        }

        // ========== PROFILE MODAL FUNCTIONS ==========
        function openEditModal() {
            document.getElementById('modalName').value = profileData.name;
            document.getElementById('modalEmail').value = profileData.email;
            document.getElementById('modalPhone').value = profileData.phone;
            document.getElementById('modalCity').value = profileData.city;
            document.getElementById('modalAvatar').value = profileData.avatar;
            document.getElementById('editProfileModal').classList.add('active');
        }

        function closeEditModal() {
            document.getElementById('editProfileModal').classList.remove('active');
        }

        function saveProfileChanges() {
            const newName = document.getElementById('modalName').value.trim();
            const newEmail = document.getElementById('modalEmail').value.trim();
            const newPhone = document.getElementById('modalPhone').value.trim();
            const newCity = document.getElementById('modalCity').value.trim();
            const newAvatar = document.getElementById('modalAvatar').value.trim();

            if (newName) profileData.name = newName;
            if (newEmail) profileData.email = newEmail;
            if (newPhone) profileData.phone = newPhone;
            if (newCity) profileData.city = newCity;
            if (newAvatar) profileData.avatar = newAvatar;

            // Save to localStorage
            saveProfileData(profileData);

            renderSidebar();
            updateDisplayView();
            syncProfileWithHeader();
            closeEditModal();
            showToast('Profile updated successfully!', 'success');
        }

        function syncProfileWithHeader() {
            if (window.updateHeaderProfile && typeof window.updateHeaderProfile === 'function') {
                window.updateHeaderProfile(profileData);
            } else {
                localStorage.setItem('userProfile', JSON.stringify({
                    name: profileData.name,
                    email: profileData.email,
                    avatar: profileData.avatar
                }));
            }
        }

        // ========== ADDRESS MODAL FUNCTIONS ==========
        function openAddressModal(mode = 'add', addressId = null) {
            const modal = document.getElementById('addressModal');
            const title = document.getElementById('addressModalTitle');
            
            resetAddressForm();
            
            if (mode === 'edit' && addressId) {
                const address = addresses.find(a => a.id === addressId);
                if (address) {
                    currentAddressId = addressId;
                    document.getElementById('addressType').value = address.type;
                    document.getElementById('street').value = address.street;
                    document.getElementById('city').value = address.city;
                    document.getElementById('state').value = address.state;
                    document.getElementById('pincode').value = address.pincode;
                    document.getElementById('country').value = address.country;
                    document.getElementById('isDefault').checked = address.isDefault;
                    
                    title.innerHTML = '<i class="fa-solid fa-pen text-accent"></i> Edit Address';
                }
            } else {
                title.innerHTML = '<i class="fa-solid fa-plus text-accent"></i> Add New Address';
            }
            
            modal.classList.add('active');
        }

        function closeAddressModal() {
            document.getElementById('addressModal').classList.remove('active');
            resetAddressForm();
        }

        function resetAddressForm() {
            document.getElementById('addressType').value = 'home';
            document.getElementById('street').value = '';
            document.getElementById('city').value = '';
            document.getElementById('state').value = '';
            document.getElementById('pincode').value = '';
            document.getElementById('country').value = 'India';
            document.getElementById('isDefault').checked = false;
            currentAddressId = null;
        }

        function saveAddress() {
            const addressData = {
                type: document.getElementById('addressType').value,
                street: document.getElementById('street').value,
                city: document.getElementById('city').value,
                state: document.getElementById('state').value,
                pincode: document.getElementById('pincode').value,
                country: document.getElementById('country').value,
                isDefault: document.getElementById('isDefault').checked
            };

            if (!addressData.street || !addressData.city || !addressData.state || !addressData.pincode) {
                showToast('Please fill in all required fields', 'warning', 3000);
                return;
            }

            if (currentAddressId) {
                // Update existing
                addresses = addresses.map(addr => 
                    addr.id === currentAddressId ? { ...addr, ...addressData } : addr
                );
                showToast('Address updated successfully!', 'success');
            } else {
                // Add new
                addressData.id = Date.now();
                addresses.push(addressData);
                showToast('New address added successfully!', 'success');
            }

            // Handle default logic
            if (addressData.isDefault) {
                addresses = addresses.map(addr => ({
                    ...addr,
                    isDefault: addr.id === (currentAddressId || addressData.id)
                }));
            }

            // Save to localStorage
            saveAddresses(addresses);
            renderAddresses();
            closeAddressModal();
        }

        // ========== DELETE POPUP FUNCTIONS ==========
        function openDeletePopup(addressId) {
            const address = addresses.find(a => a.id === addressId);
            if (!address) return;
            
            addressToDelete = addressId;
            const typeLabel = address.type.charAt(0).toUpperCase() + address.type.slice(1);
            document.getElementById('deletePopupMessage').textContent = `Are you sure you want to delete your ${typeLabel} address? This action cannot be undone.`;
            document.getElementById('deletePopup').classList.add('active');
        }

        function closeDeletePopup() {
            document.getElementById('deletePopup').classList.remove('active');
            addressToDelete = null;
        }

        function confirmDelete() {
            if (addressToDelete) {
                const address = addresses.find(a => a.id === addressToDelete);
                const typeLabel = address ? address.type : 'Address';
                
                addresses = addresses.filter(a => a.id !== addressToDelete);
                
                // Save to localStorage
                saveAddresses(addresses);
                renderAddresses();
                
                showToast(`${typeLabel.charAt(0).toUpperCase() + typeLabel.slice(1)} address deleted successfully!`, 'success');
                
                closeDeletePopup();
            }
        }

        // ========== ADDRESS ACTION FUNCTIONS ==========
        window.editAddress = function(id) {
            openAddressModal('edit', id);
        };

        window.deleteAddress = function(id) {
            openDeletePopup(id);
        };

        window.setDefaultAddress = function(id) {
            addresses = addresses.map(addr => ({
                ...addr,
                isDefault: addr.id === id
            }));
            
            // Save to localStorage
            saveAddresses(addresses);
            renderAddresses();
            
            const defaultAddress = addresses.find(a => a.id === id);
            const addressLabel = defaultAddress ? defaultAddress.type : 'Address';
            showToast(`${addressLabel.charAt(0).toUpperCase() + addressLabel.slice(1)} address set as default!`, 'success');
        };

        // ========== EVENT LISTENERS ==========
        document.addEventListener('DOMContentLoaded', function() {
            renderSidebar();
            updateDisplayView();
            renderAddresses();

            // Edit profile buttons
            document.getElementById('editProfileBtnMain').addEventListener('click', openEditModal);
            
            // Add address button
            document.getElementById('addAddressBtnCompact').addEventListener('click', () => openAddressModal('add'));

            // Profile Modal controls
            document.getElementById('closeModalBtn').addEventListener('click', closeEditModal);
            document.getElementById('cancelModalBtn').addEventListener('click', closeEditModal);
            document.getElementById('saveModalBtn').addEventListener('click', saveProfileChanges);
            document.getElementById('editProfileModal').addEventListener('click', function(e) {
                if (e.target === this) closeEditModal();
            });

            // Address Modal controls
            document.getElementById('closeAddressModalBtn').addEventListener('click', closeAddressModal);
            document.getElementById('cancelAddressBtn').addEventListener('click', closeAddressModal);
            document.getElementById('saveAddressBtn').addEventListener('click', saveAddress);
            document.getElementById('addressModal').addEventListener('click', function(e) {
                if (e.target === this) closeAddressModal();
            });

            // Delete Popup controls
            document.getElementById('confirmDeleteBtn').addEventListener('click', confirmDelete);
            document.getElementById('cancelDeleteBtn').addEventListener('click', closeDeletePopup);
            document.getElementById('deletePopup').addEventListener('click', function(e) {
                if (e.target === this) closeDeletePopup();
            });

            // Show welcome toast
            setTimeout(() => {
                showToast('Welcome to your profile! 👋', 'info', 3000);
            }, 500);
        });
    </script>
</body>
</html>
